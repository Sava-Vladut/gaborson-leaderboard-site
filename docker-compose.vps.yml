services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      LEADERBOARD_DB_FILE: /data/leaderboard.db
      LEADERBOARD_DATA_FILE: /app/server/leaderboard.json
      CORS_ORIGIN: ${CORS_ORIGIN:-https://grimnetwork.srvp.ro:5173}
    volumes:
      - leaderboard-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./docker/nginx-vps-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "5173:443"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  leaderboard-data:
