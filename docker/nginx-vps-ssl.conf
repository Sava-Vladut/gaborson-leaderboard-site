server {
    listen 443 ssl;
    http2 on;
    server_name grimnetwork.srvp.ro;

    ssl_certificate /etc/letsencrypt/live/grimnetwork.srvp.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grimnetwork.srvp.ro/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        proxy_pass http://api:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
